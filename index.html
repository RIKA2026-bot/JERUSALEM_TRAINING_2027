<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערך ההדרכה - מחוז ירושלים תשפ"ז</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f0f4f8; margin: 0; text-align: center; color: #070543; }
        .logo-container { padding: 40px 0 20px; }
        .logo-container img { max-height: 180px; }
        .hero { background: linear-gradient(135deg, #070543 0%, #460c91 100%); color: white; padding: 50px 20px; }
        .hero h1 { font-size: 36px; margin-bottom: 10px; }
        .portal-grid { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; margin-top: -30px; padding: 20px; }
        .portal-card { background: white; padding: 40px 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-decoration: none; color: #070543; font-weight: bold; font-size: 24px; min-width: 250px; border-bottom: 5px solid #460c91; transition: transform 0.2s; }
        .portal-card:hover { transform: translateY(-10px); }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="assets/logo.png" alt="לוגו משרד החינוך מחוז ירושלים">
    </div>
    <div class="hero">
        <h1>ברוכים הבאים למרחב ההדרכה המחוזי</h1>
        <p>שנת הלימודים תשפ"ז | בחרו את אזור ההדרכה שלכם:</p>
    </div>
    <div class="portal-grid">
        <a href="pages/jerusalem_district.html" class="portal-card">מחוז ירושלים (כללי)</a>
        <a href="pages/jerusalem_city.html" class="portal-card">העיר ירושלים (מערב)</a>
        <a href="pages/east_jerusalem.html" class="portal-card">מזרח ירושלים (شرق القدس)</a>
    </div>
</body>
</html>
